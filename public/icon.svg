<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Clipboard body -->
  <rect x="120" y="108" width="272" height="324" rx="22" fill="white"/>

  <!-- Clipboard clip shadow -->
  <rect x="192" y="88" width="128" height="52" rx="26" fill="#93c5fd"/>
  <!-- Clipboard clip hole -->
  <rect x="218" y="76" width="76" height="40" rx="20" fill="#1e3a8a"/>

  <!-- Invoice lines -->
  <rect x="160" y="184" width="192" height="18" rx="9" fill="#dbeafe"/>
  <rect x="160" y="222" width="192" height="18" rx="9" fill="#dbeafe"/>
  <rect x="160" y="260" width="148" height="18" rx="9" fill="#dbeafe"/>
  <rect x="160" y="298" width="168" height="18" rx="9" fill="#dbeafe"/>

  <!-- Green check circle at bottom -->
  <circle cx="256" cy="372" r="38" fill="#2563eb"/>
  <polyline points="238,372 250,386 274,358" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
